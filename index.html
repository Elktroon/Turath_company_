<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة تراث - الاستعلام عن التدريب</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border-top: 6px solid #8c763d;
        }

        .company-name {
            font-size: 28px;
            font-weight: bold;
            color: #1a252f;
            margin-bottom: 10px;
        }

        .page-title {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #8c763d;
        }

        .submit-btn {
            background-color: #1a252f;
            color: #fff;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #2c3e50;
        }

        /* تصميم نافذة الرسالة (Popup) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            text-align: right;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease-in-out;
        }

        .modal-box h3 {
            margin-bottom: 15px;
            font-size: 22px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* ألوان مخصصة للنجاح أو الفشل داخل الـ Popup */
        .success-title { color: #27ae60; border-color: #27ae60 !important; }
        .error-title { color: #c0392b; border-color: #c0392b !important; }

        .modal-box p {
            font-size: 16px;
            color: #2c3e50;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .close-btn {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            float: left;
        }

        .close-btn:hover {
            background-color: #95a5a6;
        }

        @keyframes fadeIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="company-name">شركة تراث</div>
        <div class="page-title">ادخل بياناتك الاستعلام عن التدريب</div>

        <form id="trainingForm" onsubmit="checkCredentials(event)">
            <div class="form-group">
                <label for="fullName">الاسم بالكامل:</label>
                <input type="text" id="fullName" required placeholder="أدخل الاسم رباعي">
            </div>

            <div class="form-group">
                <label for="phone">رقم التليفون:</label>
                <input type="tel" id="phone" required placeholder="01xxxxxxxxx">
            </div>

            <button type="submit" class="submit-btn">استعلام</button>
        </form>
    </div>

    <!-- نافذة النتيجة (Modal) -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-box">
            <h3 id="modalTitle">نتيجة الاستعلام</h3>
            <p id="modalMessage"></p>
            <button class="close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        function checkCredentials(event) {
            event.preventDefault(); 
            
            // جلب القيم من المدخلات وتنظيف المسافات الزائدة من الأطراف
            const inputName = document.getElementById('fullName').value.trim();
            const inputPhone = document.getElementById('phone').value.trim();

            // البيانات الصحيحة المطلوبة للمطابقة
            const targetName = "ياسمين محمود ابو سريع";
            const targetPhone = "01024758280";

            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');

            // التحقق من صحة البيانات
            if (inputName === targetName && inputPhone === targetPhone) {
                // حالة النجاح (البيانات صحيحة)
                modalTitle.innerText = "تم قبول الطلب";
                modalTitle.className = "success-title"; // تلوين العنوان بالأخضر
                modalMessage.innerText = `تم بالفعل قبولك في التدريب و نحن في انتظارك غدا في تمام الساعه العاشره صباحا في فرع الشركة بمدينة بدر حي الجامعة الروسية أمام مول النسر برجاء الحضور بدون مرافق منعا للازدحام أو احداث اي ضوضاء.`;
            } else {
                // حالة الفشل (البيانات خاطئة)
                modalTitle.innerText = " خطأ في الاستعلام";
                modalTitle.className = "error-title"; // تلوين العنوان بالأحمر
                modalMessage.innerText = "عذراً، لا يوجد تقديم بهذه البيانات. برجاء التأكد من كتابة الاسم ورقم الهاتف بشكل صحيح.";
            }

            // إظهار نافذة النتيجة
            document.getElementById('resultModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }
    </script>

</body>
</html>
